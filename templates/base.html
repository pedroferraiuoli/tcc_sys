<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <title>{% block title %}TCC - Taggeamento de PDFs{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'documents:list' %}">TCC Tagger</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="{% url 'documents:list' %}">Documentos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'experiments:list' %}">Experimentos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'evaluation:overall_dashboard' %}"
                >Dashboard Geral</a
              >
            </li>
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                id="navbarSettings"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                Configurações
              </a>
              <ul class="dropdown-menu" aria-labelledby="navbarSettings">
                <li>
                  <a class="dropdown-item" href="{% url 'llm:model_list' %}"
                    >Modelos LLM</a
                  >
                </li>
                <li>
                  <a class="dropdown-item" href="{% url 'llm:prompt_list' %}"
                    >Prompts</a
                  >
                </li>
                <li>
                  <a class="dropdown-item" href="{% url 'pipelines:list' %}"
                    >Pipelines</a
                  >
                </li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container mb-5">
      {% if messages %}
      <div class="mt-2">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} mb-2" role="alert">
          {{ message }}
        </div>
        {% endfor %}
      </div>
      {% endif %}

      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
